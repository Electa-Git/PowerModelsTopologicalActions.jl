name: Documentation

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch instead of queueing them.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and deploy docs
    runs-on: ubuntu-latest

    permissions:
      contents: write       # push the built site to the gh-pages branch
      pull-requests: read   # needed for push_preview on PRs
      statuses: write

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'   # must satisfy the [compat] entry in Project.toml

      - uses: julia-actions/cache@v2

      - name: Install dependencies
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path = pwd()))
            Pkg.instantiate()'

      - name: Build and deploy
        env:
          # Documenter uses DOCUMENTER_KEY if present, otherwise GITHUB_TOKEN.
          # GITHUB_TOKEN is provided automatically and is enough for this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs docs/make.jl